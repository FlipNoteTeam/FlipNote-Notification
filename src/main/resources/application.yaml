spring:
  application:
    name: FlipNote-Notification

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/flipnote_notification}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: ${SERVER_PORT:8086}

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON}

app:
  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:10}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:100}

springdoc:
  server:
    url: ${SPRINGDOC_SERVER_URL:http://localhost:8086}
  swagger-ui:
    path: /notifications/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /notifications/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
